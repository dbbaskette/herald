spring:
  application:
    name: herald-bot
  threads:
    virtual:
      enabled: true

  sql:
    init:
      mode: never  # Schema managed explicitly by DataSourceInitializer bean
  ai:
    tools:
      throw-exception-on-error: org.springaicommunity.agent.tools.AskUserQuestionTool$InvalidUserAnswerException
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${HERALD_MODEL_DEFAULT:claude-sonnet-4-5}
          max-tokens: 8192
    openai:
      # Disable auto-configuration — provider beans are created manually via herald.providers config
      chat:
        enabled: false
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never  # Schema managed by DataSourceInitializer via schema.sql
    mcp:
      client:
        enabled: ${HERALD_MCP_CLIENT_ENABLED:false}
        type: SYNC
        toolcallback:
          enabled: true
        sse:
          connections:
            google-calendar:
              url: ${GCAL_MCP_URL:}
            gmail:
              url: ${GMAIL_MCP_URL:}

herald:
  memory:
    db-path: ~/.herald/herald.db
  long-term-memory:
    memories-dir: ${HERALD_MEMORIES_DIR:~/.herald/memories}
  providers:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
    ollama:
      base-url: ${OLLAMA_BASE_URL:}
      api-key: ${OLLAMA_API_KEY:ollama}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
    lmstudio:
      base-url: ${LMSTUDIO_BASE_URL:}
      api-key: ${LMSTUDIO_API_KEY:lm-studio}
    # OpenAI provider — enabled when HERALD_PROVIDERS_OPENAI_API_KEY env var is set
    # openai:
    #   api-key: ${OPENAI_API_KEY}
    #   base-url: https://api.openai.com
    # Ollama provider — enabled when HERALD_PROVIDERS_OLLAMA_BASE_URL env var is set
    # ollama:
    #   base-url: http://localhost:11434
    #   api-key: ollama
  telegram:
    bot-token: ${HERALD_TELEGRAM_BOT_TOKEN:}
    allowed-chat-id: ${HERALD_TELEGRAM_ALLOWED_CHAT_ID:}
  cron:
    timezone: ${HERALD_CRON_TIMEZONE:America/New_York}
  agent:
    default-provider: ${HERALD_DEFAULT_PROVIDER:anthropic}
    persona: ${HERALD_AGENT_PERSONA:}
    system-prompt-extra: ${HERALD_AGENT_SYSTEM_PROMPT_EXTRA:}
    context-file: ${HERALD_AGENT_CONTEXT_FILE:~/.herald/CONTEXT.md}
    max-context-tokens: ${HERALD_AGENT_MAX_CONTEXT_TOKENS:200000}
    skills-directory: ${HERALD_SKILLS_DIRECTORY:~/.herald/skills}
    prompt-dump: ${HERALD_PROMPT_DUMP:false}
    approval-timeout-seconds: ${HERALD_APPROVAL_TIMEOUT_SECONDS:60}
    skills-requiring-approval: ${HERALD_SKILLS_REQUIRING_APPROVAL:}
    model-failover:
      # Opt-in: transparently retry the next chain entry on 429 / 5xx / timeout / unavailable.
      # Off by default — single-provider users see no change. Enable by setting
      # HERALD_MODEL_FAILOVER_ENABLED=true and populating the chain below (or via env).
      # See docs for examples; minimum chain size is 2.
      enabled: ${HERALD_MODEL_FAILOVER_ENABLED:false}
      # chain:
      #   - provider: anthropic
      #     model: claude-sonnet-4-5
      #   - provider: anthropic
      #     model: claude-haiku-4-5     # cheap same-provider fallback
      #   - provider: openai
      #     model: gpt-4o               # cross-provider fallback
      # retry-on: [rate-limit, server-error, timeout, unavailable]
      # failure-threshold: 3            # consecutive fails before circuit-open
      # open-for-seconds: 60            # how long to skip an open entry
    anthropic:
      # Prompt-cache strategy for Anthropic requests. Anthropic charges 25% of
      # input price on cache hits and ~1.25× on misses, so caching the system
      # prompt + tool catalog is a big win for Herald's steady-state load.
      # Values: none | tools_only | system_only | system_and_tools | conversation_history
      cache-strategy: ${HERALD_ANTHROPIC_CACHE_STRATEGY:system_and_tools}
    memory:
      # When "daily" (default), the first turn each UTC day injects a
      # <system-reminder> telling the model to consolidate MEMORY.md — merge
      # duplicates, drop stale facts, tighten descriptions. Set "off" to
      # disable (consolidation still happens on explicit request).
      consolidation-trigger: ${HERALD_MEMORY_CONSOLIDATION_TRIGGER:daily}
    model:
      haiku: ${HERALD_MODEL_HAIKU:claude-haiku-4-5}
      sonnet: ${HERALD_MODEL_SONNET:claude-sonnet-4-5}
      opus: ${HERALD_MODEL_OPUS:claude-opus-4-5}
      openai: ${HERALD_MODEL_OPENAI:gpt-4o}
      ollama: ${HERALD_MODEL_OLLAMA:llama3.2}
      gemini: ${HERALD_MODEL_GEMINI:gemini-2.5-flash}
      lmstudio: ${HERALD_MODEL_LMSTUDIO:qwen/qwen3.5-35b-a3b}
  obsidian:
    vault-path: ${HERALD_OBSIDIAN_VAULT_PATH:}
    # auto | on | off — controls whether new memory pages use [[wikilinks]].
    # auto: enable when vault-path overlaps HERALD_MEMORIES_DIR. on: always.
    # off: always plain markdown links — safest for plain-text viewers.
    vault-mode: ${HERALD_OBSIDIAN_VAULT_MODE:auto}
  vault:
    vector-store-path: ~/.herald/vector-store.json
    index-hashes-path: ~/.herald/vault-index-hashes.json
    auto-index-on-startup: true
    file-watcher-enabled: true
    search:
      auto-top-k: 2
      tool-default-top-k: 5
      min-similarity: 0.7
    chunking:
      small-file-threshold: 500
      max-chunk-size: 1000
  archival:
    message-threshold: 5
    idle-timeout-minutes: 30
    min-messages-for-idle: 2
    keep-recent-messages: 5
  weather:
    location: ${HERALD_WEATHER_LOCATION:}
  web:
    search-api-key: ${HERALD_WEB_SEARCH_API_KEY:}
  security:
    shell-blocklist:
      - 'rm\s+-rf\s+/'
      - '\bmkfs\b'
      - 'dd\s+if='
      - 'sudo\s+rm'
      - 'curl\s+.*\|\s*sh'
      - 'wget\s+.*\|\s*sh'
      - 'chmod\s+-R\s+777\s+/'
      - ':\(\)\{ :\|:& \};:'
      - 'mv\s+/\s'
      - 'rm\s+-rf\s+\*'
      - '> /dev/sda'
      - '(?:^|[;&|]\s*)(?:/(?:usr/)?s?bin/)?shutdown\b'
      - '(?:^|[;&|]\s*)(?:/(?:usr/)?s?bin/)?reboot\b'
      - 'init\s+0'
      - '(?:^|[;&|]\s*)(?:/(?:usr/)?s?bin/)?halt\b'
    shell-timeout-seconds: 30
    confirmation-timeout-seconds: 60

# Run the embedded web server on port 8080 for actuator endpoints only
server:
  port: ${HERALD_SERVER_PORT:8081}

# TODO: Restrict management endpoints before production deployment (e.g. add Spring Security actuator config)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
