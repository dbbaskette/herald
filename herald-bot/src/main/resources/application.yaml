spring:
  application:
    name: herald-bot
  threads:
    virtual:
      enabled: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 8192

herald:
  memory:
    db-path: ~/.herald/herald.db
  telegram:
    bot-token: ${HERALD_TELEGRAM_BOT_TOKEN:}
    allowed-chat-id: ${HERALD_TELEGRAM_ALLOWED_CHAT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
