spring:
  application:
    name: herald-bot
  threads:
    virtual:
      enabled: true

  sql:
    init:
      mode: never  # Schema managed explicitly by DataSourceInitializer bean
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 8192
    openai:
      # Disable auto-configuration — provider beans are created manually via herald.providers config
      chat:
        enabled: false
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never  # Schema managed by DataSourceInitializer via schema.sql

herald:
  memory:
    db-path: ~/.herald/herald.db
  providers:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
    ollama:
      base-url: ${OLLAMA_BASE_URL:}
      api-key: ${OLLAMA_API_KEY:ollama}
  telegram:
    bot-token: ${HERALD_TELEGRAM_BOT_TOKEN:}
    allowed-chat-id: ${HERALD_TELEGRAM_ALLOWED_CHAT_ID:}
  agent:
    persona: ${HERALD_AGENT_PERSONA:}
    system-prompt-extra: ${HERALD_AGENT_SYSTEM_PROMPT_EXTRA:}
  security:
    shell-blocklist:
      - 'rm\s+-rf\s+/'
      - '\bmkfs\b'
      - 'dd\s+if='
      - 'sudo\s+rm'
      - 'curl\s+.*\|\s*sh'
      - 'wget\s+.*\|\s*sh'
      - 'chmod\s+-R\s+777\s+/'
      - ':\(\)\{ :\|:& \};:'
      - 'mv\s+/\s'
      - 'rm\s+-rf\s+\*'
      - '> /dev/sda'
      - '(?:^|[;&|]\s*)(?:/(?:usr/)?s?bin/)?shutdown\b'
      - '(?:^|[;&|]\s*)(?:/(?:usr/)?s?bin/)?reboot\b'
      - 'init\s+0'
      - '(?:^|[;&|]\s*)(?:/(?:usr/)?s?bin/)?halt\b'
    shell-timeout-seconds: 30
    confirmation-timeout-seconds: 60

# Run the embedded web server on port 8080 for actuator endpoints only
server:
  port: ${HERALD_SERVER_PORT:8080}

# TODO: Restrict management endpoints before production deployment (e.g. add Spring Security actuator config)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
