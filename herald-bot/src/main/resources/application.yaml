spring:
  application:
    name: herald-bot
  threads:
    virtual:
      enabled: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 8192

herald:
  memory:
    db-path: ~/.herald/herald.db

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
