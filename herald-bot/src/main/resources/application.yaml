spring:
  application:
    name: herald-bot
  threads:
    virtual:
      enabled: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 8192
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
