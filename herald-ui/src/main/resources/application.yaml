spring:
  application:
    name: herald-ui
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 20MB    # Per-file cap for /api/chat/stream-multipart proxy
      max-request-size: 25MB # Total request cap (text + files + boundary overhead)
  mvc:
    async:
      # The proxy streams the bot's SSE response back to the browser. A 30-page PDF
      # → markitdown → wiki-ingest run can easily take a couple of minutes; the
      # default 30s tomcat async timeout was killing those mid-turn.
      request-timeout: 300000
  sql:
    init:
      mode: never

herald:
  ui:
    db-path: ${HERALD_DB_PATH:~/.herald/herald.db}
    skills-path: ${HERALD_SKILLS_PATH:~/.herald/skills}
    bundled-skills-path: ${HERALD_BUNDLED_SKILLS_PATH:}
    memories-path: ${HERALD_MEMORIES_DIR:~/.herald/memories}

server:
  port: 8080
  address: 0.0.0.0
