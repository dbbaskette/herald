spring:
  application:
    name: herald-ui
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 20MB    # Per-file cap for /api/chat/stream-multipart proxy
      max-request-size: 25MB # Total request cap (text + files + boundary overhead)
  mvc:
    async:
      # The UI proxies three SSE streams from the bot: /stream, /stream-multipart,
      # and /notifications. The notifications channel is long-lived (30 min on the
      # bot side), and chat streams with heavy tool use (markitdown + wiki-ingest)
      # can run several minutes. This timeout must be >= the longest upstream
      # SseEmitter timeout (30 min for notifications).
      request-timeout: 1800000
  sql:
    init:
      mode: never

herald:
  ui:
    db-path: ${HERALD_DB_PATH:~/.herald/herald.db}
    skills-path: ${HERALD_SKILLS_PATH:~/.herald/skills}
    bundled-skills-path: ${HERALD_BUNDLED_SKILLS_PATH:}
    memories-path: ${HERALD_MEMORIES_DIR:~/.herald/memories}

server:
  port: 8080
  address: 0.0.0.0
